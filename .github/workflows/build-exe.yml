name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Build EXE
      run: npm run build

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: GPT-EXE
        path: dist/*.exe
